# infra/nginx.conf — nginx reverse proxy for DEVRUN
# Copy to: /opt/homebrew/etc/nginx/servers/devrun.conf  (Apple Silicon Mac)
#       or: /usr/local/etc/nginx/servers/devrun.conf     (Intel Mac)
# Then: brew services restart nginx

server {
    listen 80;
    server_name localhost;   # replace with your domain or local hostname if needed

    # Proxy all requests to the Node.js server
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: increase body size limit for large save payloads
    client_max_body_size 2M;

    access_log /opt/homebrew/var/log/nginx/devrun.access.log;
    error_log  /opt/homebrew/var/log/nginx/devrun.error.log;
}
